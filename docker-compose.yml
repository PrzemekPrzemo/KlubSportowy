version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klubsportowy_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=klubsportowy
      - DB_USERNAME=klubsportowy
      - DB_PASSWORD=secret
    networks:
      - klubsportowy

  nginx:
    image: nginx:1.25-alpine
    container_name: klubsportowy_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - klubsportowy

  db:
    image: mysql:8.0
    container_name: klubsportowy_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: klubsportowy
      MYSQL_USER: klubsportowy
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - klubsportowy

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: klubsportowy_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootsecret
    depends_on:
      - db
    networks:
      - klubsportowy

volumes:
  db_data:

networks:
  klubsportowy:
    driver: bridge
