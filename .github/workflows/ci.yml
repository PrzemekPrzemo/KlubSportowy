name: CI

on:
  push:
    branches: [main, 'claude/*', 'feature/*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Lint all PHP files
        run: |
          errors=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              errors=$((errors+1))
            fi
          done < <(find app tests public/index.php cli -name '*.php')
          if [ $errors -gt 0 ]; then
            echo "Found $errors files with syntax errors"
            exit 1
          fi
          echo "All PHP files passed lint check"

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: klubsportowy_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, gd, zip, intl
          coverage: xdebug
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      - name: Setup test database
        run: mysql -h 127.0.0.1 -u root -proot klubsportowy_test < database/schema.sql
      - name: Create test config
        run: |
          cat > config/database.local.php << 'EOF'
          <?php
          return [
              'host' => '127.0.0.1', 'port' => 3306,
              'dbname' => 'klubsportowy_test',
              'username' => 'root', 'password' => 'root',
              'charset' => 'utf8mb4',
              'options' => [
                  PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                  PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                  PDO::ATTR_EMULATE_PREPARES => false,
              ],
          ];
          EOF
      - name: Run tests
        run: vendor/bin/phpunit --colors=always --testdox

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for sensitive files
        run: |
          FAIL=0
          for f in config/database.local.php config/app.local.php .env; do
            if [ -f "$f" ]; then
              echo "ERROR: $f should not be committed!"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then exit 1; fi
          echo "No sensitive files found in repo"
